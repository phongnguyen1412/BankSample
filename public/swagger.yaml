openapi: 3.0.3
info:
  title: Bank Import API
  version: 1.0.0
  description: API for admin import flow, customer account APIs, and customer transaction APIs.

servers:
  - url: http://127.0.0.1:8000
    description: Local Laravel server

tags:
  - name: Admin
    description: Admin authentication and import endpoints
  - name: Customer
    description: Customer account and transaction endpoints

paths:
  /api/admin/login:
    post:
      tags:
        - Admin
      summary: Admin login and get Bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: admin@example.com
                password:
                  type: string
                  example: admin123
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid login

  /api/admin/imports:
    post:
      tags:
        - Admin
      summary: Upload a CSV file for import
      description: Save uploaded CSV to local storage and dispatch ImportCsvJob to RabbitMQ through Laravel Queue.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file with header columns `date,content,amount,type,customer_email`
      responses:
        '202':
          description: File uploaded and queued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: File uploaded and queued successfully.
                  queue_id:
                    type: string
                    example: ABC123QUEUEIDXYZ
                  status_label:
                    type: string
                    example: Pending
                  original_name:
                    type: string
                    example: sample_data.csv
        '422':
          description: Validation error
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        '500':
          description: Server error

  /api/admin/customer-transactions:
    get:
      tags:
        - Admin
      summary: Get any customer transactions by email
      description: Admin token can query transaction records for any customer using email.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: email
          required: true
          schema:
            type: string
          example: customer1@example.com
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            example: 1
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 10
      responses:
        '200':
          description: Transactions fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  customer:
                    type: object
                    properties:
                      email:
                        type: string
                        example: customer1@example.com
                      name:
                        type: string
                        example: Customer 2
                  pagination:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 120
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        transaction_uid:
                          type: string
                          example: 9a5c0a123example
                        date:
                          type: string
                          example: 2026-04-09 10:00:00
                        content:
                          type: string
                          example: Salary payment
                        amount:
                          type: string
                          example: +1000
                        type:
                          type: string
                          example: Deposit
        '404':
          description: Customer not found
        '422':
          description: Validation error
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        '500':
          description: Server error

  /api/customer/register:
    post:
      tags:
        - Customer
      summary: Customer register and get Bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Customer Demo
                email:
                  type: string
                  example: customerdemo@example.com
                password:
                  type: string
                  example: 123456
      responses:
        '201':
          description: Customer account created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Customer account created successfully.
                  token:
                    type: string
                    example: 1|customerRegisterTokenExample
                  token_type:
                    type: string
                    example: Bearer
        '422':
          description: Validation error

  /api/customer/login:
    post:
      tags:
        - Customer
      summary: Customer login and get Bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: customer1@example.com
                password:
                  type: string
                  example: 123456
      responses:
        '200':
          description: Customer login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Customer login successful.
                  token:
                    type: string
                    example: 1|customerLoginTokenExample
                  token_type:
                    type: string
                    example: Bearer
        '401':
          description: Invalid login

  /api/customer/transaction:
    get:
      tags:
        - Customer
      summary: Get current customer transactions
      description: Customer token can only access the current customer transaction list.
      security:
        - customerBearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            example: 1
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 10
      responses:
        '200':
          description: Current customer transactions fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  customer:
                    type: object
                    properties:
                      email:
                        type: string
                        example: customer1@example.com
                      name:
                        type: string
                        example: Customer 2
                  pagination:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 25
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        transaction_uid:
                          type: string
                          example: 9a5c0a123example
                        date:
                          type: string
                          example: 2026-04-09 10:00:00
                        content:
                          type: string
                          example: Grocery payment
                        amount:
                          type: string
                          example: -120
                        type:
                          type: string
                          example: Withdraw
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        '500':
          description: Server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Token
    customerBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Customer Sanctum Token
